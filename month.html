        <div class="inner" style="padding: 0px;">
            <h1>SQL MONTH() Function</h1>

            <p>The <strong>MONTH()</strong> function returns the month part for a given date.</p>

            <h2>Syntax</h2>
            <pre><code class="language-sql">MONTH(date)</code></pre>

            <h2>Parameter Values</h2>
            <ul>
                <li><strong>date</strong>: Required. The date to extract the month from.</li>
            </ul>

            <h2>MONTH() Example</h2>
            <p>The following SQL statement shows the current month we're in:</p>
            <pre><code class="language-sql">SELECT MONTH(CURRENT_TIMESTAMP);</code></pre>

        </div>
