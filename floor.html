            <h1>SQL FLOOR() Function</h1>

            <p>The <strong>FLOOR()</strong> function returns a number rounded down to the nearest integer.</p>

            <h2>Syntax</h2>
            <pre><code class="language-sql">FLOOR(number)</code></pre>

            <h2>Parameter Values</h2>
            <ul>
                <li><strong>number</strong>: Required. The numeric value to round down.</li>
            </ul>

            <h2>FLOOR() Example</h2>
            <p>The following SQL statement rounds down <strong>25.9</strong> to <strong>25</strong>:</p>

            <pre><code class="language-sql">SELECT FLOOR(25.9);</code></pre>
