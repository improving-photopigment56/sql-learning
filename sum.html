            <h1>SQL SUM() Function</h1>

            <p>The <strong>SUM()</strong> function returns the total sum of a numeric column.</p>

            <h2>SUM() Syntax</h2>
            <pre><code class="language-sql">SELECT SUM(column_name)
FROM table_name
WHERE condition;</code></pre>

            <h2>SUM() Example</h2>
            <p>The following SQL statement finds the sum of patients' weight:</p>
            <pre><code class="language-sql">SELECT SUM(weight) FROM patients;</code></pre>
