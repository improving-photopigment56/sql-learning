        <div class="inner" style="padding: 0px;">
            <h1>SQL CURRENT_TIMESTAMP Function</h1>

            <p>The <strong>CURRENT_TIMESTAMP</strong> function returns the current date and time.</p>

            <p>Note: The date and time is returned as "YYYY-MM-DD HH-MM-SS" (string).</p>

            <h2>CURRENT_TIMESTAMP Example</h2>
            <p>The following SQL statement shows the current timestamp:</p>

            <pre><code class="language-sql">SELECT CURRENT_TIMESTAMP;</code></pre>
